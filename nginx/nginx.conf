resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;

    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html>
<head>
    <title>GIS Dashboards</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; color: #333; }
        h1 { margin-bottom: 32px; }
        a { display: block; padding: 16px 20px; margin: 8px 0; background: #f5f5f5; border-radius: 8px; color: #1a73e8; text-decoration: none; font-size: 18px; }
        a:hover { background: #e8f0fe; }
        .slug { color: #888; font-size: 14px; font-family: monospace; }
    </style>
</head>
<body>
    <h1>GIS Dashboards</h1>
    <a href="/nwi/">Nederwiek I Dashboard <span class="slug">/nwi/</span></a>
    <a href="/tnw/">TNW Dashboard <span class="slug">/tnw/</span></a>
    <a href="/nwi-arup/">NWI Arup Dashboard <span class="slug">/nwi-arup/</span></a>
</body>
</html>';
    }

    location /nwi/ {
        set $nwi_upstream nwi-dashboard;
        rewrite ^/nwi/(.*) /$1 break;
        proxy_pass http://$nwi_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /tnw/ {
        set $tnw_upstream tnw-dashboard;
        rewrite ^/tnw/(.*) /$1 break;
        proxy_pass http://$tnw_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /nwi-arup/ {
        set $nwi_arup_upstream nwi-arup-dashboard;
        rewrite ^/nwi-arup/(.*) /$1 break;
        proxy_pass http://$nwi_arup_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

