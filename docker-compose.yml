services:
  # ==========================================================================
  # Nederwiek I (NWI) Dashboard Service
  # Usage: docker compose up nwi-dashboard
  # Access: http://localhost:8000
  # ==========================================================================
  nwi-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data-extracted:/app/data-extracted:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================================================
  # TNW Dashboard Service
  # Usage: docker compose up tnw-dashboard
  # Access: http://localhost:8001
  # ==========================================================================
  tnw-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.tnw
    ports:
      - "8001:8000"
    volumes:
      - ./data-extracted:/app/data-extracted:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================================================
  # NWI Arup Geological Ground Model Dashboard
  # Usage: docker compose up nwi-arup-dashboard
  # Access: http://localhost:8002
  # ==========================================================================
  nwi-arup-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.nwi_arup
    ports:
      - "8003:8000"
    volumes:
      - ./data-extracted:/app/data-extracted:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================================================
  # Nginx Reverse Proxy
  # Usage: docker compose up nginx
  # Access: http://localhost:8080 | https://localhost:8443
  # Slugs: /nwi/ /tnw/ /nwi-arup/
  # ==========================================================================
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - nwi-dashboard
      - tnw-dashboard
      - nwi-arup-dashboard
    restart: unless-stopped

  # ==========================================================================
  # Data Download Service (CLI tool)
  # Usage:
  #   docker compose run --rm data-download list
  #   docker compose run --rm data-download list --json
  #   docker compose run --rm data-download download --id 123
  #   docker compose run --rm data-download download --all
  #   docker compose run --rm data-download search "keyword"
  # ==========================================================================
  data-download:
    build:
      context: .
      dockerfile: Dockerfile.download
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_OUTPUT_DIR=/app/data
    profiles:
      - tools

  # ==========================================================================
  # GDB Inventory Service (analyze geodatabase layers)
  # Usage:
  #   docker compose run --rm gdb-inventory
  #   docker compose run --rm gdb-inventory ./data-extracted/custom.gdb
  # ==========================================================================
  gdb-inventory:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data-extracted:/app/data-extracted:ro
    environment:
      - PYTHONUNBUFFERED=1
    entrypoint: ["python", "gdb_inventory.py"]
    profiles:
      - tools

  # ==========================================================================
  # Generic Python Runner (for arbitrary scripts)
  # Usage:
  #   docker compose run --rm python-runner script.py --args
  # ==========================================================================
  python-runner:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
      - ./data-extracted:/app/data-extracted
      - .:/app/src:ro
    working_dir: /app/src
    environment:
      - PYTHONUNBUFFERED=1
    entrypoint: ["python"]
    profiles:
      - tools

  # ==========================================================================
  # JupyterLab Service (GIS Notebooks)
  # Usage: docker compose up jupyter
  # Access: http://localhost:8888
  # ==========================================================================
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
      - ./data-extracted:/app/data-extracted:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
